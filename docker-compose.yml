version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lumo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lumo_finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lumo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumo-api
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      ENVIRONMENT: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lumo_finance
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key-change-in-production
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-5}
      NOMBA_API_KEY: ${NOMBA_API_KEY:-test-key}
      NOMBA_BASE_URL: https://api.nomba.com/v1
      NOMBA_MODE: sandbox
      NOMBA_ENV: sandbox
      NOMBA_PARENT_ACCOUNT_ID: ${NOMBA_PARENT_ACCOUNT_ID:-}
      NOMBA_SUB_ACCOUNT_ID: ${NOMBA_SUB_ACCOUNT_ID:-}
      NOMBA_CLIENT_ID: ${NOMBA_CLIENT_ID:-}
      NOMBA_CLIENT_SECRET: ${NOMBA_CLIENT_SECRET:-}
      NOMBA_WEBHOOK_SECRET: ${NOMBA_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lumo-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WORKER_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: lumo-network
